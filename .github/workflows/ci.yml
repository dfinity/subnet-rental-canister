name: CI

on:
  pull_request:
  push:
    branches: ["master"]
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Docker build subnet rental canister
        run: |
          ./scripts/docker_build.sh
          # Fix permissions after Docker operations
          sudo chown -R $(whoami):$(whoami) . || true

      - name: Get Wasm dependencies
        run: ./scripts/get_wasms.sh

      - name: Run tests
        run: cargo test --all-targets --all-features -- --nocapture
        env:
          RUST_BACKTRACE: 1

  dfx-deploy:
    name: Dfx deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dfx
        uses: dfinity/setup-dfx@e50c04f104ee4285ec010f10609483cf41e4d365 # main
        with:
          dfx-version: "0.27.0"

      - name: Start dfx
        run: dfx start --background

      - name: Docker build subnet rental canister
        run: |
          ./scripts/docker_build.sh
          # Fix permissions after Docker operations
          sudo chown -R $(whoami):$(whoami) . || true

      - name: Deploy subnet rental canister
        run: |
          dfx canister create subnet_rental_canister
          dfx canister install subnet_rental_canister --wasm subnet_rental_canister.wasm.gz

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run fmt
        run: cargo fmt --all -- --check

  release:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Docker build
        run: |
          ./scripts/docker_build.sh

      - name: Upload artifacts to release page
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # master
        with:
          files: |
            subnet_rental_canister.wasm.gz
